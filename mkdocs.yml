site_url: https://scientific-image.bogdanovych.org
site_name: Науковий образ світу
site_description: База знань курсу «Науковий образ світу»
copyright: '<a href="/pages/about/">© 2026 Науковий образ світу</a>'
docs_dir: data
site_dir: build
extra:
  generator: false
  analytics:
    provider: google
    property: G-XZVQVKJPNK
exclude_docs: |
  wiki/log.md
  AGENTS.md
  .gitignore
  .agents/**
  templates/**
  inbox/**
  raw/assets/**
theme:
  name: material
  favicon: static/images/favicon.png
  language: uk
  palette:
    - scheme: default
      primary: blue-grey
      toggle:
        icon: material/brightness-7
        name: Темна тема
    - scheme: slate
      primary: blue-grey
      toggle:
        icon: material/brightness-4
        name: Світла тема
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
  custom_dir: src/overrides
hooks:
  - src/hooks.py
markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - meta
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
extra_css:
  - static/styles/wikipedia.css
extra_javascript:
  - static/scripts/random-articles.js
  - static/scripts/external-links.js
