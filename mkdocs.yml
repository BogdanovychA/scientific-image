site_name: Науковий образ світу
site_description: База знань курсу «Науковий образ світу»
docs_dir: data
exclude_docs: |
  wiki/log.md
  AGENTS.md
  .gitignore
  .agents/**
  templates/**
  inbox/**
  raw/assets/**
theme:
  name: material
  language: uk
  palette:
    - scheme: default
      primary: blue-grey
      toggle:
        icon: material/brightness-7
        name: Темна тема
    - scheme: slate
      primary: blue-grey
      toggle:
        icon: material/brightness-4
        name: Світла тема
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
  custom_dir: overrides
hooks:
  - build_hooks.py          # трансформація контенту при збірці (без правки вихідних файлів)
