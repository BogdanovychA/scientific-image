site_name: Науковий образ світу
site_description: База знань курсу «Науковий образ світу»
copyright: '© 2026 Науковий образ світу'
docs_dir: data
site_dir: build
extra:
  generator: false
exclude_docs: |
  wiki/log.md
  AGENTS.md
  .gitignore
  .agents/**
  templates/**
  inbox/**
  raw/assets/**
theme:
  name: material
  language: uk
  palette:
    - scheme: default
      primary: blue-grey
      toggle:
        icon: material/brightness-7
        name: Темна тема
    - scheme: slate
      primary: blue-grey
      toggle:
        icon: material/brightness-4
        name: Світла тема
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
  custom_dir: overrides
hooks:
  - src/hooks.py  # трансформація контенту при збірці (без правки вихідних файлів)
# Навігація генерується автоматично хуком src/hooks.py з файлів у папці data
markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - meta
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
extra_css:
  - static/styles/wikipedia.css
extra_javascript:
  - static/scripts/random-articles.js
