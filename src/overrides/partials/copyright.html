<div class="md-copyright">
  {% if config.copyright %}
    <div class="md-copyright__highlight">
      <a href="{{ about_page_path | url }}">{{ config.copyright }}</a>
    </div>
  {% endif %}
  {% if footer_note %}
    <div class="md-footer-note" style="font-size: 0.64rem; margin-top: 0.5em;">
      {{ footer_note | safe }}
    </div>
  {% endif %}
  {% if not config.extra.generator == false %}
    <div class="md-generator">
      Made with
      <a href="https://squidfunk.github.io/mkdocs-material/" target="_blank" rel="noopener">
        Material for MkDocs
      </a>
    </div>
  {% endif %}
</div>
